name: Level
options:
  bundleIdPrefix: com.paultaylor.level
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  groupSortPosition: top
  createIntermediateGroups: true
  usesTabs: false
  indentWidth: 2
  tabWidth: 2

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MACCATALYST: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 7HHDW86546
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Level:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Level
        excludes:
          - "Resources/Fonts/**/*.txt"
    resources:
      - path: Level/Resources/Assets.xcassets
      - path: Level/Resources/Fonts
        optional: true
    info:
      path: SupportingFiles/Level-Info.plist
      properties:
        CFBundleDisplayName: Level
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
        UIAppFonts:
          - PlusJakartaSans-Regular.ttf
          - PlusJakartaSans-Medium.ttf
          - PlusJakartaSans-Bold.ttf
          - PlusJakartaSans-ExtraBold.ttf
          - PlusJakartaSans-ExtraBoldItalic.ttf
          - Fraunces-Variable.ttf
          - Fraunces-VariableItalic.ttf
          - Fraunces72pt-Bold.ttf
    entitlements:
      path: SupportingFiles/Level.entitlements
      properties:
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - group.com.paultaylor.level
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.paultaylor.level
        PRODUCT_NAME: Level
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: ""
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: LevelMonitor
      - target: LevelShield

  LevelMonitor:
    type: extensionkit-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LevelMonitor
    info:
      path: SupportingFiles/LevelMonitor-Info.plist
      properties:
        CFBundleDisplayName: LevelMonitor
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        EXAppExtensionAttributes:
          EXExtensionPointIdentifier: com.apple.deviceactivity.monitor
          EXPrincipalClass: $(PRODUCT_MODULE_NAME).LevelMonitorExtension
    entitlements:
      path: SupportingFiles/LevelMonitor.entitlements
      properties:
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - group.com.paultaylor.level
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.paultaylor.level.monitor
        PRODUCT_NAME: LevelMonitor
        GENERATE_INFOPLIST_FILE: NO

  LevelShield:
    type: extensionkit-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LevelShield
    info:
      path: SupportingFiles/LevelShield-Info.plist
      properties:
        CFBundleDisplayName: LevelShield
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        EXAppExtensionAttributes:
          EXExtensionPointIdentifier: com.apple.ManagedSettings.shield-configuration
          EXPrincipalClass: $(PRODUCT_MODULE_NAME).LevelShieldExtension
    entitlements:
      path: SupportingFiles/LevelShield.entitlements
      properties:
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - group.com.paultaylor.level
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.paultaylor.level.shield
        PRODUCT_NAME: LevelShield
        GENERATE_INFOPLIST_FILE: NO
